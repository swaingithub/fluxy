name: fluxy_example
description: A comprehensive example demonstrating Fluxy framework capabilities
version: 1.0.0

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  fluxy:
    path: ../
  fluxy_haptics:
    path: ../packages/fluxy_haptics
  fluxy_device:
    path: ../packages/fluxy_device
  fluxy_logger:
    path: ../packages/fluxy_logger
  fluxy_camera:
    path: ../packages/fluxy_camera
  fluxy_auth:
    path: ../packages/fluxy_auth
  fluxy_notifications:
    path: ../packages/fluxy_notifications
  fluxy_storage:
    path: ../packages/fluxy_storage
  fluxy_biometric:
    path: ../packages/fluxy_biometric
  fluxy_connectivity:
    path: ../packages/fluxy_connectivity
  fluxy_permissions:
    path: ../packages/fluxy_permissions
  fluxy_websocket:
    path: ../packages/fluxy_websocket
  fluxy_sync:
    path: ../packages/fluxy_sync
  fluxy_presence:
    path: ../packages/fluxy_presence
  fluxy_stream_bridge:
    path: ../packages/fluxy_stream_bridge
  fluxy_geo:
    path: ../packages/fluxy_geo

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  fluxy:
    path: ../

flutter:
  uses-material-design: true
