name: fluxy_example
description: A comprehensive example demonstrating Fluxy framework capabilities
version: 1.0.0

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  fluxy: ^1.0.0
  fluxy_camera: ^1.0.0
  fluxy_auth: ^1.0.0
  fluxy_notifications: ^1.0.0
  fluxy_storage: ^1.0.0
  fluxy_biometric: ^1.0.0
  fluxy_connectivity: ^1.0.0
  fluxy_permissions: ^1.0.0
  fluxy_platform: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
