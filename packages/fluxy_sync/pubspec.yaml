name: fluxy_sync
description: Offline-first synchronization engine for the Fluxy framework.
version: 1.1.0
homepage: https://github.com/swaingithub/fluxy
repository: https://github.com/swaingithub/fluxy
issue_tracker: https://github.com/swaingithub/fluxy/issues

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  fluxy:
    path: ../../
  fluxy_storage:
