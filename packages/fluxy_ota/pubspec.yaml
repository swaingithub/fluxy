name: fluxy_ota
description: OTA (Over-The-Air) update system and SDUI renderer for the Fluxy framework.
version: 0.2.6
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  fluxy:
    path: ../../
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
