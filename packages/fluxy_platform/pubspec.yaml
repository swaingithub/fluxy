name: fluxy_platform
description: "A meta-package for the Fluxy framework that includes the core engine and all official plugins."
version: 1.0.0
homepage: https://github.com/swaingithub/fluxy
repository: https://github.com/swaingithub/fluxy
issue_tracker: https://github.com/swaingithub/fluxy/issues

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  fluxy: ^1.0.0
  fluxy_camera: ^1.0.0
  fluxy_notifications: ^1.0.0
  fluxy_connectivity: ^1.0.0
  fluxy_permissions: ^1.0.0
  fluxy_storage: ^1.0.0
  fluxy_auth: ^1.0.0
  fluxy_analytics: ^1.0.0
  fluxy_biometric: ^1.0.0
  fluxy_ota: ^1.0.0

flutter:
  uses-material-design: true
